<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Overview Tracker — IRS Resolution Service</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a84c;--gold-dim:#8a6e2f;--gold-muted:#f5ecd8;
  --ink:#1a1410;--ink-soft:#4a3f32;--ink-muted:#7a6e60;
  --cream:#f5f0e8;--cream-dark:#d9cdb8;--white:#fff;
  --red:#c0392b;--green:#1a5c2a;--green-bg:#edf7f0;
  --red-bg:#fdf0f0;--amber:#b7791f;--amber-bg:#fffbeb;
  --blue-bg:#eff6ff;--blue:#1a4a8a;
  --serif:'Cormorant Garamond',Georgia,serif;--sans:'Outfit',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh}

/* ── Login ── */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.lbox{background:var(--white);border:1px solid var(--cream-dark);border-radius:8px;padding:2.5rem;width:100%;max-width:380px;text-align:center}
.lbox h2{font-family:var(--serif);font-size:1.5rem;margin-bottom:.25rem}
.lbox p{font-size:13px;color:var(--ink-muted);margin-bottom:1.75rem}
.linput{width:100%;padding:10px 14px;border:1px solid var(--cream-dark);border-radius:4px;font-family:var(--sans);font-size:15px;background:var(--cream);color:var(--ink);margin-bottom:.75rem}
.lbtn{width:100%;padding:11px;background:var(--gold);color:var(--white);border:none;border-radius:4px;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer}
.lerr{font-size:13px;color:var(--red);margin-top:.5rem;display:none}

/* ── App shell ── */
#app{display:none;max-width:1200px;margin:0 auto;padding:2rem 1.5rem 4rem}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.75rem;flex-wrap:wrap;gap:1rem}
.topbar h1{font-family:var(--serif);font-size:2.25rem;font-weight:700}
.topbar p{font-size:14px;color:var(--ink-muted);margin-top:3px}
.actions{display:flex;gap:.5rem;align-items:center}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 18px;border-radius:4px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--cream-dark);background:var(--white);color:var(--ink)}
.btn:hover{background:var(--cream)}
.btn.gold{background:var(--gold);color:var(--white);border-color:transparent}
.btn.gold:hover{background:var(--gold-dim)}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ── Status bar ── */
.sbar{display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--cream-dark);border-radius:4px;padding:9px 16px;font-size:13px;color:var(--ink-muted);margin-bottom:1.25rem}
.dot{width:8px;height:8px;border-radius:50%;background:var(--cream-dark);flex-shrink:0}
.dot.green{background:#27ae60}
.dot.amber{background:var(--amber);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── KPI cards ── */
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:1.5rem}
.kpi{background:var(--white);border:1px solid var(--cream-dark);border-radius:6px;padding:14px 18px}
.kpi-l{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-muted);margin-bottom:5px}
.kpi-v{font-size:28px;font-weight:700;font-family:var(--serif);color:var(--ink)}
.kpi-s{font-size:12px;color:var(--ink-muted);margin-top:3px}
.kpi-v.green{color:var(--green)}
.kpi-v.amber{color:var(--amber)}
.kpi-v.red{color:var(--red)}

/* ── History chart ── */
.hist{background:var(--white);border:1px solid var(--cream-dark);border-radius:6px;padding:1.25rem;margin-bottom:1.5rem}
.hist h3{font-size:12px;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.875rem;display:flex;align-items:center;gap:1rem}
.hist-legend{display:flex;gap:.75rem;font-weight:400;text-transform:none;letter-spacing:0}
.hist-legend span{display:flex;align-items:center;gap:4px;font-size:12px}
.hdot{width:10px;height:10px;border-radius:2px}
.hchart{display:flex;align-items:flex-end;gap:3px;height:64px;overflow-x:auto}
.hcol{display:flex;flex-direction:column;align-items:center;gap:1px;flex-shrink:0;position:relative;cursor:pointer}
.hcol:hover .htip{display:block}
.htip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--white);border-radius:4px;padding:8px 12px;font-size:12px;white-space:nowrap;z-index:100;min-width:180px;margin-bottom:6px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.htip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--ink)}
.htip-date{font-weight:700;color:var(--gold);margin-bottom:6px;font-size:11px;text-transform:uppercase;letter-spacing:.06em}
.htip-kw{font-size:11px;color:rgba(255,255,255,.8);padding:2px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.htip-kw:last-child{border-bottom:none}
.htip-kw.aio{color:#b3d4f0}
.htip-kw.cited{color:#7ec89e}
.th-sort{cursor:pointer;user-select:none}
.th-sort:hover{color:var(--ink)}
.sort-arrow{font-size:10px;margin-left:3px;opacity:.5}
.sort-arrow.active{opacity:1;color:var(--gold-dim)}
.hbar{width:18px;border-radius:2px 2px 0 0;min-height:2px}
.hcol{display:flex;flex-direction:column;align-items:center;gap:1px;flex-shrink:0;position:relative;cursor:pointer}
.hcol:hover .htip{display:block}
.htip{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--ink);color:var(--white);border-radius:4px;padding:8px 12px;font-size:12px;white-space:nowrap;z-index:100;min-width:200px;box-shadow:0 4px 12px rgba(0,0,0,.25)}
.htip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--ink)}
.htip-date{font-weight:700;color:var(--gold-light);margin-bottom:5px;font-size:11px;text-transform:uppercase;letter-spacing:.06em}
.htip-row{font-size:11px;padding:2px 0;display:flex;justify-content:space-between;gap:12px}
.htip-row.aio{color:#b3d4f0}
.htip-row.cited{color:#7ec89e}
.th-sort{cursor:pointer;user-select:none;white-space:nowrap}
.th-sort:hover{color:var(--ink)}
.sort-arr{font-size:10px;margin-left:3px;color:var(--gold-dim)}
.hdate{font-size:9px;color:var(--ink-muted);writing-mode:vertical-lr;transform:rotate(180deg);margin-top:4px}

/* ── Filters ── */
.filters{display:flex;gap:.35rem;margin-bottom:.875rem;flex-wrap:wrap}
.ftab{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--cream-dark);background:var(--white);color:var(--ink-muted);font-family:var(--sans)}
.ftab.active{background:var(--ink);color:var(--white);border-color:transparent}

/* ── Keyword table ── */
.tbl-wrap{background:var(--white);border:1px solid var(--cream-dark);border-radius:6px;overflow:hidden}
.tbl-count{padding:.625rem 1rem;font-size:12px;color:var(--ink-muted);border-bottom:1px solid var(--cream-dark)}
table.kw{width:100%;border-collapse:collapse}
table.kw th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-muted);padding:8px 12px;text-align:left;background:var(--cream);border-bottom:1px solid var(--cream-dark)}
table.kw td{padding:11px 12px;border-bottom:1px solid var(--cream-dark);font-size:14px;color:var(--ink-soft);vertical-align:top}
table.kw tr:last-child td{border-bottom:none}
table.kw tr:hover td{background:#faf8f4}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:3px;white-space:nowrap}
.badge.cited{background:var(--green-bg);color:var(--green)}
.badge.aio{background:var(--blue-bg);color:var(--blue)}
.badge.no-aio{background:var(--cream);color:var(--ink-muted)}
.badge.rank{background:var(--gold-muted);color:var(--gold-dim)}
.badge.no-rank{background:var(--cream);color:var(--ink-muted)}
.badge.err{background:var(--red-bg);color:var(--red)}

/* ── Our pages appearances ── */
.our-pages{display:flex;flex-direction:column;gap:4px;margin-top:5px}
.our-page{font-size:12px;display:flex;align-items:baseline;gap:5px}
.our-page-where{font-weight:600;color:var(--green);white-space:nowrap}
.our-page-link{color:var(--gold-dim);text-decoration:none;word-break:break-all}
.our-page-link:hover{text-decoration:underline}
.our-page-title{color:var(--ink-muted);font-size:11px}
.not-found{font-size:12px;color:var(--ink-muted);font-style:italic;margin-top:4px}

/* ── AIO sources ── */
.aio-srcs{display:flex;flex-direction:column;gap:3px;margin-top:5px}
.aio-src{font-size:12px;color:var(--ink-muted);display:flex;gap:4px}
.aio-src a{color:var(--gold-dim);text-decoration:none}
.aio-src a.ours{color:var(--green);font-weight:600}
.aio-src a:hover{text-decoration:underline}
.btn-aio{font-size:12px;color:var(--gold-dim);background:none;border:none;cursor:pointer;font-family:var(--sans);padding:3px 0;text-decoration:underline;text-underline-offset:2px;margin-top:4px;display:block}

/* ── AIO Detail modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(26,20,16,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:var(--white);border-radius:6px;width:100%;max-width:740px;max-height:88vh;overflow-y:auto;border-top:3px solid var(--gold);box-shadow:0 16px 48px rgba(0,0,0,.18)}
.modal-hd{display:flex;align-items:flex-start;justify-content:space-between;padding:1.25rem 1.5rem .75rem;gap:1rem;border-bottom:1px solid var(--cream-dark)}
.modal-hd h2{font-family:var(--serif);font-size:1.35rem;font-weight:600;flex:1}
.modal-x{background:none;border:none;font-size:24px;cursor:pointer;color:var(--ink-muted);line-height:1;padding:0;flex-shrink:0}
.modal-body{padding:1.25rem 1.5rem 1.5rem}
.modal-kw{font-size:13px;color:var(--ink-muted);margin-bottom:1rem}
.aio-fulltext{font-size:14px;line-height:1.75;color:var(--ink-soft);background:var(--cream);border-radius:4px;padding:1rem;margin-bottom:1.25rem;white-space:pre-wrap;max-height:300px;overflow-y:auto}
.src-heading{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-muted);margin-bottom:.625rem}
.src-row{display:flex;align-items:baseline;gap:8px;padding:6px 0;border-bottom:1px solid var(--cream-dark);font-size:13px}
.src-row:last-child{border-bottom:none}
.src-num{color:var(--ink-muted);font-size:12px;min-width:18px}
.src-domain{font-size:11px;color:var(--ink-muted)}
.src-row a{color:var(--gold-dim);text-decoration:none;word-break:break-all}
.src-row a.ours{color:var(--green);font-weight:600}
.src-row a:hover{text-decoration:underline}
.empty{text-align:center;padding:3rem;color:var(--ink-muted);font-size:14px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--cream-dark);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="login">
  <div class="lbox">
    <h2>IRS Resolution Service</h2>
    <p>AI Overview Tracker — internal tool</p>
    <input type="password" class="linput" id="pw" placeholder="Admin password">
    <button class="lbtn" onclick="doLogin()">Sign in →</button>
    <div class="lerr" id="lerr">Incorrect password</div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div>
      <h1>AI Overview Tracker</h1>
      <p id="lastChecked">177 keywords · irsresolutionservice.com · Updated daily 6am UTC</p>
    </div>
    <div class="actions">
      <button class="btn" onclick="logout()">Sign out</button>
      <button class="btn gold" id="runBtn" onclick="runNow()">↻ Run now</button>
    </div>
  </div>

  <div class="sbar">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Loading…</span>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="hist" id="histWrap" style="display:none">
    <h3>30-day trend
      <span class="hist-legend">
        <span><span class="hdot" style="background:#b3d4f0"></span>AIO shown <span id="legend-aio" style="font-weight:700;color:var(--ink)"></span></span>
        <span><span class="hdot" style="background:var(--green)"></span>We appear <span id="legend-cited" style="font-weight:700;color:var(--green)"></span></span>
      </span>
    </h3>
    <div class="hchart" id="hchart"></div>
  </div>

  <div class="filters" id="filterBar"></div>

  <div class="tbl-wrap">
    <div class="tbl-count" id="tblCount"></div>
    <div id="tblBody"><div class="empty">Loading…</div></div>
  </div>
</div>

<!-- AIO detail modal -->
<div class="modal-bg" id="aioModal">
  <div class="modal">
    <div class="modal-hd">
      <h2>AI Overview</h2>
      <button class="modal-x" onclick="closeAio()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-kw" id="aioKw"></div>
      <div id="aioBody"></div>
    </div>
  </div>
</div>

<script>
const PW_KEY = 'seo_pw';
let apw = '', allResults = [], curFilter = 'all', sortCol = null, sortDir = 'asc';

// ── Auth ──────────────────────────────────────────────────────────────────────
async function doLogin() {
  const pw = document.getElementById('pw').value.trim();
  if (!pw) return;
  const r = await fetch('/api/admin-auth', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pw})});
  if (r.ok) { apw = pw; sessionStorage.setItem(PW_KEY, pw); showApp(); }
  else document.getElementById('lerr').style.display = 'block';
}
function logout() { sessionStorage.removeItem(PW_KEY); location.reload(); }
document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
const saved = sessionStorage.getItem(PW_KEY);
if (saved) {
  fetch('/api/admin-auth', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:saved})})
    .then(r => { if(r.ok){apw=saved;showApp();} else sessionStorage.removeItem(PW_KEY); })
    .catch(() => {});
}

// ── App ───────────────────────────────────────────────────────────────────────
function showApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadResults();
}

async function loadResults() {
  setStatus('amber', 'Fetching latest results…');
  try {
    const r = await fetch('/api/seo-track?action=results');
    if (!r.ok) { setStatus('amber', `Server error ${r.status} — check Netlify function logs`); return; }
    let d;
    try { d = await r.json(); }
    catch(e) { setStatus('amber', 'Response parse error — function may have crashed. Check Netlify logs.'); return; }

    if (d.results && d.results.keywords && d.results.keywords.length) {
      allResults = d.results.keywords.map(r => ({
        ...r,
        our_pages: (r.our_pages || []).map(p => ({
          where: String(p.where || ''),
          link: String(p.link || ''),
          title: String(p.title || '')
        }))
      }));
      renderKpis(d.results);
      renderFilters();
      renderTable(curFilter);
      renderHistory(d.history || []);
      
      const dt = new Date(d.results.checkedAt);
      const dtStr = isNaN(dt) ? '—' : `${dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})} at ${dt.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}`;
      const isPartial = d.results.partial && d.results.keywords.length < 127;
      document.getElementById('lastChecked').textContent =
        isPartial 
          ? `${d.results.keywords.length}/177 keywords checked · last updated ${dtStr} · incomplete run`
          : `177 keywords · last checked ${dtStr}`;

      const appearing = d.results.keywords.filter(k => k.our_pages && k.our_pages.length > 0).length;
      const errCount  = d.results.keywords.filter(k => k.error).length;

      if (isPartial) {
        setStatus('amber', `Partial results: ${d.results.keywords.length}/177 keywords · click "Run now" to complete (will resume where left off)`);
      } else {
        setStatus('green', `We appear in ${appearing} searches · ${d.results.summary.site_cited} cited in AI Overview${errCount ? ` · ${errCount} errors` : ''}`);
      }

      // If all 19 complete but summary wasn't saved (walked away), save it now
      if (d.results.partial === false && !d.results.checkedAt.startsWith('200')) {
        fetch(`/api/seo-track?action=finish&password=${encodeURIComponent(apw)}`).catch(() => {});
      }
    } else {
      setStatus('amber', 'No data yet — click "Run now" to check all 177 keywords');
      document.getElementById('tblBody').innerHTML = '<div class="empty">No results yet. Click "Run now" above to run the first check.</div>';
      renderFilters();
    }
  } catch(e) { setStatus('amber', 'Fetch error: ' + e.message); }
}

// ── Run now: browser drives keyword loop, one fetch per keyword ──────────────
let runAborted = false;
const SESSION_KEY = 'seo_run_results_v2';  // v2 = null-safe our_pages

async function runNow() {
  const btn = document.getElementById('runBtn');
  runAborted = false;
  btn.disabled = true;

  // Fetch keyword list
  let keywords;
  try {
    const r = await fetch('/api/seo-track?action=keywords');
    const d = await r.json();
    keywords = d.keywords || [];
  } catch(e) { setStatus('amber', 'Could not fetch keyword list: ' + e.message); btn.disabled=false; btn.innerHTML='↻ Run now'; return; }

  // Resume: load any already-completed results from sessionStorage
  let savedResults = [];
  try { savedResults = JSON.parse(sessionStorage.getItem(SESSION_KEY) || '[]'); } catch {}
  // Sanitize our_pages on restore — old cached data may have non-string link/where
  savedResults = savedResults.map(r => ({
    ...r,
    our_pages: (r.our_pages || []).map(p => ({
      where: String(p.where || ''),
      link: String(p.link || ''),
      title: String(p.title || '')
    }))
  }));
  const doneKeywords = new Set(savedResults.map(r => r.keyword));
  const results = [...savedResults];
  if (savedResults.length > 0) {
    setStatus('amber', `Resuming from keyword ${savedResults.length + 1}/${keywords.length}…`);
  }

  for (let i = 0; i < keywords.length; i++) {
    if (runAborted) break;
    const kw = keywords[i];
    
    // Skip already-done keywords
    if (doneKeywords.has(kw)) continue;

    btn.innerHTML = `<span class="spinner"></span> ${results.length+1}/${keywords.length}`;
    setStatus('amber', `Checking ${results.length+1} of ${keywords.length} — "${kw.substring(0,50)}…"`);

    try {
      // Try up to 2 times — ValueSERP can hit Netlify's 40s limit
      let r, result, attempts = 0;
      while (attempts < 2) {
        attempts++;
        r = await fetch(`/api/seo-track?action=check&password=${encodeURIComponent(apw)}&kw=${encodeURIComponent(kw)}`);
        if (r.status === 502 && attempts < 2) {
          setStatus('amber', `Keyword ${results.length+1}/${keywords.length} timed out — retrying…`);
          await sleep(3000);
          continue;
        }
        try { result = await r.json(); } catch(e) { result = { error: `HTTP ${r.status}: ${e.message}` }; }
        break;
      }
      const okResult = r.ok ? result : { keyword: kw, error: result?.error || `HTTP ${r.status}`, our_pages: [], in_aio: false, checkedAt: new Date().toISOString() };
      if (okResult.our_pages) okResult.our_pages = okResult.our_pages.map(p => ({ where: String(p.where||''), link: String(p.link||''), title: String(p.title||'') }));
      results.push(okResult);
    } catch(e) {
      results.push({ keyword: kw, error: e.message, our_pages: [], in_aio: false, checkedAt: new Date().toISOString() });
    }

    // Save progress to sessionStorage after each keyword (survives page refresh)
    try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(results)); } catch {}

    // Update table live
    allResults = results;
    renderTable(curFilter);
    renderKpis({ keywords: results, summary: {
      total: keywords.length,
      in_aio: results.filter(r=>r.in_aio).length,
      site_cited: results.filter(r=>r.site_cited).length,
      ranked: results.filter(r=>r.our_pages&&r.our_pages.length>0).length,
    }});

    if (i < keywords.length - 1) await sleep(500);
  }

  // Save final summary to blobs
  try { await fetch(`/api/seo-track?action=finish&password=${encodeURIComponent(apw)}`); } catch {}

  // Clear session storage on completion
  try { sessionStorage.removeItem(SESSION_KEY); } catch {}

  const appeared = results.filter(r => r.our_pages && r.our_pages.length > 0).length;
  const cited    = results.filter(r => r.site_cited).length;
  const errors   = results.filter(r => r.error).length;
  setStatus('green', `Complete — we appear in ${appeared} searches · ${cited} cited in AIO${errors ? ` · ${errors} errors` : ''}`);
  btn.disabled = false;
  btn.innerHTML = '↻ Run now';
  allResults = results;
  renderTable(curFilter);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function setStatus(state, text) {
  document.getElementById('statusDot').className = 'dot ' + (state === 'green' ? 'green' : 'amber');
  document.getElementById('statusText').textContent = text;
}

// ── KPIs ──────────────────────────────────────────────────────────────────────
function renderKpis(data) {
  const kw = data.keywords || [], t = kw.length;
  const appearing = kw.filter(r => r.our_pages && r.our_pages.length > 0).length;
  const inAio     = kw.filter(r => r.in_aio).length;
  const cited     = kw.filter(r => r.site_cited).length;
  const organic   = kw.filter(r => r.organic_rank).length;
  const errs      = kw.filter(r => r.error).length;
  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><div class="kpi-l">Keywords tracked</div><div class="kpi-v">${t}</div><div class="kpi-s">daily check</div></div>
    <div class="kpi"><div class="kpi-l">We appear</div><div class="kpi-v ${appearing>0?'green':''}">${appearing}</div><div class="kpi-s">anywhere in results</div></div>
    <div class="kpi"><div class="kpi-l">AIO shown</div><div class="kpi-v ${inAio>0?'amber':''}">${inAio}</div><div class="kpi-s">${t?Math.round(inAio/t*100):0}% of keywords</div></div>
    <div class="kpi"><div class="kpi-l">Cited in AIO</div><div class="kpi-v ${cited>0?'green':''}">${cited}</div><div class="kpi-s">${inAio?Math.round(cited/inAio*100):0}% of AIO results</div></div>
    <div class="kpi"><div class="kpi-l">Organic rank</div><div class="kpi-v">${organic}</div><div class="kpi-s">in top 10</div></div>
    ${errs ? `<div class="kpi"><div class="kpi-l">Errors</div><div class="kpi-v red">${errs}</div><div class="kpi-s">check API key</div></div>` : ''}`;
}

// ── History ───────────────────────────────────────────────────────────────────
function renderHistory(hist) {
  if (!hist.length) { document.getElementById('histWrap').style.display='none'; return; }
  document.getElementById('histWrap').style.display = 'block';
  const maxA = Math.max(...hist.map(h=>h.in_aio), 1);
  const maxC = Math.max(...hist.map(h=>h.site_cited), 1);

  // Update legend with latest totals
  const latest = hist[0] || {};
  const legAio = document.getElementById('legend-aio');
  const legCited = document.getElementById('legend-cited');
  if (legAio) legAio.textContent = latest.in_aio != null ? `(${latest.in_aio})` : '';
  if (legCited) legCited.textContent = latest.site_cited != null ? `(${latest.site_cited})` : '';

  document.getElementById('hchart').innerHTML = [...hist].reverse().map(h => {
    const ah = Math.round((h.in_aio / maxA) * 56);
    const ch = Math.round((h.site_cited / maxC) * 56);
    const dateLabel = h.date ? h.date.slice(5) : '—';

    // Build tooltip — show which keywords appeared on this day if available
    const kwsOnDay = (h.keywords || []);
    const aioKws   = kwsOnDay.filter(k => k.in_aio);
    const citedKws = kwsOnDay.filter(k => k.site_cited);

    let tipRows = '';
    if (citedKws.length) {
      tipRows += citedKws.map(k => `<div class="htip-row cited">✓ ${esc(k.keyword.substring(0,38))}</div>`).join('');
    }
    if (aioKws.length && !citedKws.length) {
      tipRows += aioKws.slice(0,5).map(k => `<div class="htip-row aio">AIO ${esc(k.keyword.substring(0,36))}</div>`).join('');
    }
    if (!tipRows) {
      tipRows = `<div class="htip-row aio">AIO shown: ${h.in_aio}</div><div class="htip-row cited">We appear: ${h.site_cited}</div>`;
    }

    return `<div class="hcol">
      <div class="htip">
        <div class="htip-date">${dateLabel}</div>
        <div class="htip-row aio">AIO shown: <strong>${h.in_aio}</strong></div>
        <div class="htip-row cited">We appear: <strong>${h.site_cited}</strong></div>
        ${tipRows !== `<div class="htip-row aio">AIO shown: ${h.in_aio}</div><div class="htip-row cited">We appear: ${h.site_cited}</div>` ? '<div style="border-top:1px solid rgba(255,255,255,.15);margin:5px 0"></div>' + tipRows : ''}
      </div>
      <div style="display:flex;align-items:flex-end;gap:1px;height:58px">
        <div class="hbar" style="height:${ah}px;background:#b3d4f0"></div>
        <div class="hbar" style="height:${ch}px;background:var(--green)"></div>
      </div>
      <div class="hdate">${esc(dateLabel)}</div>
    </div>`;
  }).join('');
}

// ── Filters ───────────────────────────────────────────────────────────────────
function renderFilters() {
  const appearing = allResults.filter(r => r.our_pages && r.our_pages.length > 0).length;
  const filters = [
    {id:'all',     label:`All (${allResults.length || 30})`},
    {id:'we_appear', label:'✓ We appear'},
    {id:'cited',   label:'In AIO'},
    {id:'organic', label:'Organic rank'},
    {id:'no_us',   label:'Not found'},
    {id:'error',   label:'Errors'},
  ];
  document.getElementById('filterBar').innerHTML = filters.map(f =>
    `<button class="ftab ${curFilter===f.id?'active':''}" onclick="setF('${f.id}',this)">${esc(f.label)}</button>`
  ).join('');
}

function setF(f, el) {
  curFilter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTable(f);
}

// ── Table ─────────────────────────────────────────────────────────────────────
function sortByCol(col) {
  if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortCol = col; sortDir = 'desc'; }
  renderTable(curFilter);
}

function renderTable(filter) {
  let rows = allResults;
  if (filter === 'we_appear') rows = rows.filter(r => r.our_pages && r.our_pages.length > 0);
  if (filter === 'cited')     rows = rows.filter(r => r.site_cited);
  if (filter === 'organic')   rows = rows.filter(r => r.organic_rank);
  if (filter === 'no_us')     rows = rows.filter(r => !r.our_pages || r.our_pages.length === 0);
  if (filter === 'error')     rows = rows.filter(r => r.error);

  // Sort
  if (sortCol === 'appear') {
    rows = [...rows].sort((a, b) => {
      const av = (a.our_pages||[]).length, bv = (b.our_pages||[]).length;
      return sortDir === 'desc' ? bv - av : av - bv;
    });
  } else if (sortCol === 'organic') {
    rows = [...rows].sort((a, b) => {
      const av = a.organic_rank || 999, bv = b.organic_rank || 999;
      return sortDir === 'asc' ? av - bv : bv - av;
    });
  } else if (sortCol === 'aio') {
    rows = [...rows].sort((a, b) => {
      const av = a.in_aio ? 1 : 0, bv = b.in_aio ? 1 : 0;
      return sortDir === 'desc' ? bv - av : av - bv;
    });
  }

  document.getElementById('tblCount').textContent = `${rows.length} keyword${rows.length !== 1 ? 's' : ''}`;

  if (!rows.length) {
    document.getElementById('tblBody').innerHTML = '<div class="empty">No keywords match this filter</div>';
    return;
  }

  const arr = (col) => sortCol === col ? `<span class="sort-arr">${sortDir==='desc'?'↓':'↑'}</span>` : '<span class="sort-arr" style="opacity:.25">↕</span>';

  const html = `<table class="kw">
    <thead><tr>
      <th style="width:30%">Keyword</th>
      <th style="width:70px">Checked</th>
      <th class="th-sort" onclick="sortByCol('aio')" style="width:90px">AI Overview ${arr('aio')}</th>
      <th class="th-sort" onclick="sortByCol('appear')">Where we appear ${arr('appear')}</th>
      <th class="th-sort" onclick="sortByCol('organic')" style="width:90px">Organic ${arr('organic')}</th>
    </tr></thead>
    <tbody>${rows.map(r => {
      const dt = r.checkedAt ? r.checkedAt.slice(5, 10) : '—';
      const rowBg = r.site_cited ? 'background:linear-gradient(90deg,#edf7f0 0%,transparent 100%)'
                  : r.in_aio     ? 'background:linear-gradient(90deg,#fffbeb 0%,transparent 100%)'
                  : '';
      const aioBadge = r.error
        ? `<span class="badge err" title="${esc(r.error)}">Error</span>`
        : r.in_aio ? `<span class="badge aio">✓ AIO</span>` : `<span class="badge no-aio">No AIO</span>`;
      const errorDetail = r.error
        ? `<span style="font-size:12px;color:var(--red);font-family:monospace">${esc(r.error.substring(0,120))}</span>`
        : null;
      const aioBtn = (r.in_aio && (r.aio_text || (r.aio_sources && r.aio_sources.length)))
        ? `<button class="btn-aio" onclick='openAio(this)' data-r='${esc(JSON.stringify(r))}'>View full AIO ↗</button>`
        : '';
      let appearHtml = '';
      if (errorDetail) {
        appearHtml = errorDetail;
      } else if (r.our_pages && r.our_pages.length > 0) {
        appearHtml = `<div class="our-pages">${r.our_pages.map(p => {
          const whereStr = String(p.where || '');
          const linkStr = String(p.link || '');
          const isAio = whereStr.startsWith('AIO');
          const isOrg = whereStr.startsWith('Organic');
          const col = isAio ? 'var(--green)' : isOrg ? 'var(--blue)' : 'var(--amber)';
          const linkPart = linkStr ? `<a class="our-page-link" href="${esc(linkStr)}" target="_blank" rel="noopener">${esc(slugify(linkStr))}</a>` : '';
          const titlePart = p.title ? `<span class="our-page-title"> — ${esc(String(p.title).substring(0,50))}</span>` : '';
          return `<div class="our-page"><span class="our-page-where" style="color:${col}">${esc(whereStr)}</span>${linkPart}${titlePart}</div>`;
        }).join('')}</div>`;
      } else {
        appearHtml = `<span class="not-found">Not found in this search</span>`;
      }
      const orgBadge = r.organic_rank ? `<span class="badge rank">#${r.organic_rank}</span>` : `<span class="badge no-rank">—</span>`;
      return `<tr style="${rowBg}">
        <td><strong style="font-size:14px">${esc(r.keyword)}</strong></td>
        <td style="color:var(--ink-muted);font-size:12px;white-space:nowrap">${dt}</td>
        <td>${aioBadge}${aioBtn}</td>
        <td>${appearHtml}</td>
        <td>${orgBadge}</td>
      </tr>`;
    }).join('')}</tbody></table>`;

  document.getElementById('tblBody').innerHTML = html;
}


// ── AIO modal ─────────────────────────────────────────────────────────────────
function openAio(btn) {
  let r;
  try { r = JSON.parse(btn.dataset.r || '{}'); } catch { return; }
  document.getElementById('aioKw').textContent = `Keyword: "${r.keyword}" · checked ${r.checkedAt ? new Date(r.checkedAt).toLocaleString() : '—'}`;

  const sources = (r.aio_sources || []).map((s, i) => {
    const sLink = String(s.link || '');
    const isOurs = sLink.includes('irsresolutionservice.com');
    let dom = '';
    try { dom = new URL(sLink).hostname.replace('www.',''); } catch { dom = sLink; }
    return `<div class="src-row">
      <span class="src-num">${i+1}</span>
      <div>
        <a href="${esc(s.link)}" target="_blank" rel="noopener" class="${isOurs?'ours':''}">${esc(s.title || dom)}</a>
        <div class="src-domain">${esc(dom)}${isOurs?' ← our site':''}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('aioBody').innerHTML = `
    ${r.aio_text
      ? `<div class="aio-fulltext">${esc(r.aio_text)}</div>`
      : '<p style="color:var(--ink-muted);font-size:13px;margin-bottom:1rem">No AIO text captured — re-run to fetch.</p>'}
    ${sources
      ? `<div class="src-heading">Sources cited in AI Overview (${(r.aio_sources||[]).length})</div>${sources}`
      : '<p style="color:var(--ink-muted);font-size:13px">No sources recorded</p>'}`;

  document.getElementById('aioModal').classList.add('open');
}

function closeAio() { document.getElementById('aioModal').classList.remove('open'); }
document.getElementById('aioModal').addEventListener('click', e => {
  if (e.target === document.getElementById('aioModal')) closeAio();
});

// ── Utilities ─────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function slugify(url) {
  try {
    const u = new URL(url);
    return u.hostname.replace('www.','') + u.pathname;
  } catch { return url; }
}
